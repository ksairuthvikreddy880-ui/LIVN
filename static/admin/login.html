<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIVN Admin — Login</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-text">LIVN</div>
      </div>
      <p class="login-subtitle">Admin Portal</p>
      <h2 class="login-title">Sign in to continue</h2>

      <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('isAdminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      if (email === 'Bylivinclothing@gmail.com' && password === 'LIVN@2026_clothing') {
        localStorage.setItem('isAdminLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errorEl.classList.add('show');
        document.getElementById('password').value = '';
      }
    }
  </script>
</body>
</html>
